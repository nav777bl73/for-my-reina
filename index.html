<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        /* ----- ОБЩИЕ СТИЛИ И ФОН ----- */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('you.jpg');

        }

        /* ----- ЗАГОЛОВКИ И ТЕКСТ ----- */
        h1 {
            text-align: center;
            font-size: 38px;
            color: #dc0d0d;

        h2 {

        }

        h3 {
            text-align: center;
            font-size: 19px;
            font-weight: normal;
            color: #c8d4d1;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        h4 {
            text-align: center;
            font-size: 22px;
            color: #b0d4d1;
            margin-top: 5px;
            margin-bottom: 25px;

        /* ----- СПЕЦИАЛЬНЫЕ ЭЛЕМЕНТЫ ----- */

            font-size: 28px;
            color: #dc0d0d;

        }

        .highlight {

            margin-top: 25px;
        }

        a {
            color: #ff8a9e;

            border-bottom: 1px solid #ff8a9e;
            padding-bottom: 1px;
            transition: 0.2s;
        }

        a:hover {
            color: #ff4d6d;
            border-bottom-color: #ff4d6d;
        }

        /* ----- ДОПОЛНИТЕЛЬНО ДЛЯ КРАСОТЫ ----- */

</head>
<body>
<audio id="bg-music" loop volume="0.3">
<!-- ===== МУЗЫКА С УПРАВЛЕНИЕМ ===== -->
<audio id="bg-music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()" style="display: block; margin: 20px auto; padding: 14px 35px; background: #dc0d0d; color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer;">
    🎵 Включить музыку
</button>

<script>
    let isPlaying = false;
    const audio = document.getElementById('bg-music');

    function toggleMusic() {
        if (isPlaying) {
            audio.pause();
            this.textContent = '🎵 Включить музыку';
            this.style.background = '#dc0d0d';
        } else {
            audio.play();
            this.textContent = '⏸️ Выключить музыку';
            this.style.background = '#b00a0a';
        }
        isPlaying = !isPlaying;
    }
</script>

    <h1>eres mi reina, Emilia</h1>

    <h2>всегда рядом, всегда тебя люблю.</h2>

    <h3>прости, что всё так сложилось, я очень скучаю по тебе. если ты дашь мне шанс, если позволишь остаться, я буду самым счастливым. ты прекрасна, ты настоящий цветок, ты мой воздух и моя жизнь. я думаю о тебе каждую секунду, я никогда не смогу выкинуть тебя из головы и забыть... надеюсь, что это достаточно нестандартный для тебя способ признаться в чувствах. я не сидел сложа руки всё это время, и к тому же не могу перестать думать о тебе, искать тебя и варианты принести извинения. всё это время.</h3>

    <h4>я исправлюсь, я стану лучше. для тебя. для нас.</h4>

    <p class="divider">***</p>

    <p>здравствуй, милая моя подруга,<br>
    как себя сейчас чувствуешь ты?<br>
    "я тебя никогда не забуду",<br>
    прошепчу и отдам цветы.</p>

    <p>ты, наверное, больше не вспомнишь,<br>
    задушишь все чувства свои.<br>
    я тебя никогда не забуду,<br>
    а ты бей, ненавидь и души...</p>

    <p>твои мысли я пью кофе крепким,<br>
    любуясь тобой издали...<br>
    я тебя никогда не забуду,<br>
    я ослепну в порыве любви...</p>

    <p>ты красивей, чем позднее лето,<br>
    ты живее яркой весны!..<br>
    я отдам тебе сердце и душу,<br>
    а ты к себе подпусти...</p>

    <p>позволь мне тобой любоваться,<br>
    слышать твой голос вблизи...<br>
    я его никогда не забуду,<br>
    сохраню в своей памяти...</p>

    <p>ты так чудна и красива,<br>
    как лёгкий и солнечный май...<br>
    я держу тебя за руку крепко,<br>
    и не верю, что это явь...</p>

    <p>отдаюсь тебе я всецело,<br>
    и прошу - мной повелевай...<br>
    я тебя никогда не забуду,<br>
    и счастлив, что знаю тебя...</p>

    <p class="highlight">
        я говорил тебе раньше, что <u>без ума от тебя</u>.<br>
        но теперь понимаю, что без ума я <u>без</u> тебя.
    </p>
